name: Java Microservice DevSecOps Pipeline

on:
  push:
    branches: ["main"]

env:
  APP_NAME: java-microservice

# ================================
# 🧩 STAGE 1: CHECKOUT
# ================================
jobs:
  checkout:
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.set-output.outputs.repo }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Output
        id: set-output
        run: echo "repo=checked-out" >> $GITHUB_OUTPUT


# ================================
# 🏗️ STAGE 2: BUILD
# ================================
  build:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Compile & Package
        run: mvn clean package -DskipTests


# ================================
# 🧪 STAGE 3: UNIT TEST
# ================================
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Run Unit Tests
        run: mvn test


# ================================
# 🔍 STAGE 4: STATIC CODE ANALYSIS (Optional)
# ================================
  code-analysis:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Run Checkstyle
        run: mvn checkstyle:check || true


# ================================
# 🛡️ STAGE 5: OWASP DEPENDENCY SCAN
# ================================
  owasp-scan:
    runs-on: ubuntu-latest
    needs: code-analysis

    steps:
      - uses: actions/checkout@v3

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check


# ================================
# 🌐 STAGE 6: NVD API VULNERABILITY SCAN
# ================================
  nvd-scan:
    runs-on: ubuntu-latest
    needs: owasp-scan

    steps:
      - uses: actions/checkout@v3

      - name: Extract Dependencies
        run: mvn dependency:list -DoutputFile=deps.txt

      - name: Call NVD API
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "[]" > nvd-report.json
          while read line; do
            curl -s -H "apiKey: $NVD_API_KEY" \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=$line" \
            >> nvd-report.json
          done < deps.txt


# ================================
# 🚫 STAGE 7: SECURITY GATE (FAIL ON CRITICAL)
# ================================
  security-gate:
    runs-on: ubuntu-latest
    needs: nvd-scan

    steps:
      - uses: actions/checkout@v3

      - name: Check for Critical Vulnerabilities
        run: |
          if grep -i "CRITICAL" nvd-report.json; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No critical vulnerabilities"
          fi
